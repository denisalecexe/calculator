<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/src/assets/favicon/calc-favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Calculator</title>
</head>
<body>
    <!-- CONTAINER DELL'INTERA CALCOLATRICE -->
    <div id="calculator">
        <!-- INPUT DI TESTO PER SCRIVERE -->
        <input type="text" name="result" id="result" value="0" readonly>

        <!-- CONTAINER PER I TASTI DELLA CALCOLATRICE -->
        <div id="btn-container">
            <!-- CONTENUTORE PER I BOTTONI AVANZATI -->
            <div id="btn-advanced">
                <button id="canc" class="btn"><i class="bi bi-c-circle"></i></button>
                <button id="back-space" class="btn"><i class="bi bi-backspace"></i></button>
                <button id="open-parenthesis" class="btn">(</button>
                <button id="comma" class="btn">.</button>
                <button id="close-parenthesis" class="btn">)</button>
            </div>

            <!-- CONTENITORE PER I NUMERI -->
            <div id="btn-number">
                <button id="btn-1" class="btn">1</button>
                <button id="btn-2" class="btn">2</button>
                <button id="btn-3" class="btn">3</button>
                <button id="btn-4" class="btn">4</button>
                <button id="btn-5" class="btn">5</button>
                <button id="btn-6" class="btn">6</button>
                <button id="btn-7" class="btn">7</button>
                <button id="btn-8" class="btn">8</button>
                <button id="btn-9" class="btn">9</button>
                <button id="btn-0" class="btn">0</button>
            </div>

            <!-- CONTENITORI PER GLI OPERATORI -->
            <div id="btn-operator">
                <button id="plus" class="btn">+</button>
                <button id="minus" class="btn">-</button>
                <button id="division" class="btn">/</button>
                <button id="multiplication" class="btn">*</button>
                <button id="moduls" class="btn">%</button>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
